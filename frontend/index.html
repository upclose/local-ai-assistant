<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI Assistant</title>
  <style>
    /* ── Reset & variables ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0d0d;
      --surface:     #1a1a1a;
      --surface2:    #242424;
      --border:      #2e2e2e;
      --accent:      #7c6af7;
      --accent-dim:  #4b3fc9;
      --text:        #e8e8e8;
      --text-dim:    #888;
      --user-bg:     #1e1b3a;
      --ai-bg:       #1a1a1a;
      --green:       #4ade80;
      --red:         #f87171;
      --radius:      10px;
      --font:        "Inter", system-ui, sans-serif;
      --mono:        "JetBrains Mono", "Fira Code", monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 12px;
      overflow-y: auto;
    }

    #sidebar h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      padding: 4px 8px;
      letter-spacing: .03em;
    }

    #new-chat-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 9px 14px;
      font-size: .85rem;
      cursor: pointer;
      font-weight: 600;
      transition: background .15s;
    }
    #new-chat-btn:hover { background: var(--accent-dim); }

    #session-list { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .session-item {
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background .12s, color .12s;
    }
    .session-item:hover     { background: var(--surface2); color: var(--text); }
    .session-item.active    { background: var(--user-bg);  color: var(--accent); }

    #sidebar-footer {
      font-size: .72rem;
      color: var(--text-dim);
      text-align: center;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    #ollama-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }

    /* ── Main area ─────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ───────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    #toolbar select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 10px;
      font-size: .82rem;
      cursor: pointer;
    }

    #toolbar label { font-size: .82rem; color: var(--text-dim); }

    #stream-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .82rem;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
    }
    #stream-toggle input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

    #clear-btn {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 7px;
      padding: 5px 12px;
      font-size: .8rem;
      cursor: pointer;
      transition: border-color .12s, color .12s;
    }
    #clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Chat messages ─────────────────────────────────────────────── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      gap: 4px;
    }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.ai    { align-self: flex-start; align-items: flex-start; }

    .msg-role {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    .msg.user  .msg-role { color: var(--accent); }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: .9rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid var(--accent-dim);
    }
    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
    }

    /* code blocks inside replies */
    .msg-bubble code {
      font-family: var(--mono);
      background: #111;
      padding: 2px 5px;
      border-radius: 4px;
      font-size: .84em;
    }
    .msg-bubble pre {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .msg-bubble pre code { background: none; padding: 0; }

    .tool-badge {
      font-size: .72rem;
      background: #1f2b1f;
      color: var(--green);
      border: 1px solid #2a3f2a;
      border-radius: 20px;
      padding: 2px 9px;
      align-self: flex-start;
    }

    /* typing indicator */
    .typing span {
      display: inline-block;
      width: 7px; height: 7px;
      margin: 0 2px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce .9s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: .4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input row ─────────────────────────────────────────────────── */
    #input-row {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: .9rem;
      font-family: var(--font);
      padding: 11px 14px;
      resize: none;
      max-height: 160px;
      overflow-y: auto;
      outline: none;
      transition: border-color .15s;
      line-height: 1.5;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0 20px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
    }
    #send-btn:hover    { background: var(--accent-dim); }
    #send-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Memory panel ──────────────────────────────────────────────── */
    #memory-panel {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #memory-panel.open { display: flex; }

    #memory-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: min(560px, 95vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #memory-box header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    #memory-box header h2 { font-size: 1rem; }

    #memory-close {
      background: none; border: none; color: var(--text-dim);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
    }
    #memory-close:hover { color: var(--text); }

    #memory-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

    #memory-add-form {
      display: flex; gap: 8px; margin-bottom: 16px;
    }
    #memory-add-form input {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); padding: 7px 10px; font-size: .83rem;
      outline: none;
    }
    #memory-add-form input:focus { border-color: var(--accent); }
    #memory-add-form button {
      background: var(--accent); color: #fff; border: none; border-radius: 7px;
      padding: 7px 14px; font-size: .83rem; cursor: pointer; white-space: nowrap;
    }

    #fact-list { display: flex; flex-direction: column; gap: 8px; }

    .fact-row {
      display: flex; justify-content: space-between; align-items: center;
      background: var(--surface2); border-radius: 8px; padding: 8px 12px;
      font-size: .83rem;
    }
    .fact-row .fact-key   { font-weight: 600; color: var(--accent); margin-right: 8px; }
    .fact-row .fact-value { color: var(--text); flex: 1; word-break: break-word; }
    .fact-del {
      background: none; border: none; color: var(--text-dim);
      font-size: 1rem; cursor: pointer; padding: 2px 6px; border-radius: 5px;
    }
    .fact-del:hover { background: #3a1a1a; color: var(--red); }

    /* ── Scrollbar ─────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      #sidebar { display: none; }
      .msg { max-width: 96%; }
    }
  </style>
</head>
<body>

<!-- ══ SIDEBAR ══════════════════════════════════════════════════════════ -->
<aside id="sidebar">
  <h1>🤖 Local AI</h1>
  <button id="new-chat-btn">＋ New Chat</button>
  <div id="session-list"></div>
  <div id="sidebar-footer">
    <span id="ollama-status"></span><span id="ollama-label">checking…</span>
  </div>
</aside>

<!-- ══ MAIN ═════════════════════════════════════════════════════════════ -->
<div id="main">

  <!-- toolbar -->
  <div id="toolbar">
    <label for="model-select">Model:</label>
    <select id="model-select"><option value="">loading…</option></select>

    <label class="stream-toggle" id="stream-toggle">
      <input type="checkbox" id="stream-cb" checked />
      Stream
    </label>

    <button id="memory-btn" title="Manage long-term memory" style="
      background:none; border:1px solid var(--border); color:var(--text-dim);
      border-radius:7px; padding:5px 12px; font-size:.8rem; cursor:pointer;">
      🧠 Memory
    </button>

    <button id="clear-btn">🗑 Clear chat</button>
  </div>

  <!-- messages -->
  <div id="chat-window">
    <div class="msg ai">
      <div class="msg-role">Assistant</div>
      <div class="msg-bubble">
        Hello! I'm your local AI assistant running entirely on your machine. How can I help?<br><br>
        <code>/memory</code> — manage facts &nbsp;|&nbsp; <code>/clear</code> — wipe this session
      </div>
    </div>
  </div>

  <!-- input -->
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Type a message… (Shift+Enter for newline)"></textarea>
    <button id="send-btn">Send ↑</button>
  </div>

</div>

<!-- ══ MEMORY PANEL ══════════════════════════════════════════════════════ -->
<div id="memory-panel">
  <div id="memory-box">
    <header>
      <h2>🧠 Long-term Memory</h2>
      <button id="memory-close">×</button>
    </header>
    <div id="memory-body">
      <div id="memory-add-form">
        <input id="fact-key"   placeholder="key (e.g. user_name)" />
        <input id="fact-value" placeholder="value" />
        <button id="fact-add-btn">Add</button>
      </div>
      <div id="fact-list"><em style="color:var(--text-dim)">Loading…</em></div>
    </div>
  </div>
</div>

<script>
/* ── State ──────────────────────────────────────────────────────────── */
const API = "";   // same origin
let currentSession = "default";
let isThinking     = false;

/* ── Helpers ────────────────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const chatWindow = $("chat-window");

function scrollBottom() {
  chatWindow.scrollTop = chatWindow.scrollHeight;
}

function genSessionId() {
  return "s_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

/** Minimal markdown → HTML: bold, italic, inline code, fenced code blocks */
function mdToHtml(text) {
  // fenced code blocks
  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escHtml(code.trimEnd())}</code></pre>`);
  // inline code
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${escHtml(c)}</code>`);
  // bold
  text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // italic
  text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
  return text;
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── Append message to chat window ─────────────────────────────────── */
function appendMsg(role, html, toolsUsed = []) {
  const wrap  = document.createElement("div");
  wrap.className = `msg ${role}`;

  const label  = document.createElement("div");
  label.className = "msg-role";
  label.textContent = role === "user" ? "You" : "Assistant";

  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = html;

  wrap.appendChild(label);
  wrap.appendChild(bubble);

  if (toolsUsed.length) {
    const badge = document.createElement("div");
    badge.className = "tool-badge";
    badge.textContent = "🔧 " + toolsUsed.join(", ");
    wrap.appendChild(badge);
  }

  chatWindow.appendChild(wrap);
  scrollBottom();
  return bubble;  // return for streaming updates
}

/** Typing indicator */
function showTyping() {
  const wrap   = document.createElement("div");
  wrap.className = "msg ai";
  wrap.id = "typing-indicator";
  const label  = document.createElement("div");
  label.className = "msg-role";
  label.textContent = "Assistant";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble typing";
  bubble.innerHTML = "<span></span><span></span><span></span>";
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatWindow.appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = $("typing-indicator");
  if (el) el.remove();
}

/* ── Load sessions into sidebar ─────────────────────────────────────── */
async function loadSessions() {
  try {
    const res  = await fetch(`${API}/api/sessions`);
    const data = await res.json();
    const list = $("session-list");
    list.innerHTML = "";

    data.forEach(s => {
      const item = document.createElement("div");
      item.className = "session-item" + (s.id === currentSession ? " active" : "");
      item.title     = s.id;
      item.textContent = s.title || s.id;
      item.onclick   = () => switchSession(s.id, item);
      list.appendChild(item);
    });
  } catch { /* sidebar not critical */ }
}

function switchSession(id, el) {
  currentSession = id;
  document.querySelectorAll(".session-item").forEach(i => i.classList.remove("active"));
  el?.classList.add("active");
  chatWindow.innerHTML = "";
  loadHistory();
}

async function loadHistory() {
  try {
    const res  = await fetch(`${API}/api/sessions/${currentSession}/messages`);
    const msgs = await res.json();
    chatWindow.innerHTML = "";
    msgs.forEach(m => appendMsg(m.role === "user" ? "user" : "ai", mdToHtml(m.content)));
  } catch { /* ignore */ }
}

/* ── Ollama health ───────────────────────────────────────────────────── */
async function checkOllama() {
  try {
    const res  = await fetch(`${API}/api/sessions/health/ollama`);
    const data = await res.json();
    const dot  = $("ollama-status");
    const lbl  = $("ollama-label");

    if (data.ollama_available) {
      dot.style.background = "#4ade80";
      lbl.textContent = "Ollama online";
      const sel = $("model-select");
      sel.innerHTML = data.models.map(m =>
        `<option value="${m}">${m}</option>`).join("");
    } else {
      dot.style.background = "#f87171";
      lbl.textContent = "Ollama offline";
      $("model-select").innerHTML = `<option value="">— offline —</option>`;
    }
  } catch {
    $("ollama-status").style.background = "#f87171";
    $("ollama-label").textContent = "server down";
  }
}

/* ── Send message ────────────────────────────────────────────────────── */
async function sendMessage() {
  const input = $("user-input");
  const text  = input.value.trim();
  if (!text || isThinking) return;

  const model   = $("model-select").value || undefined;
  const doStream = $("stream-cb").checked;

  input.value = "";
  input.style.height = "auto";
  isThinking = true;
  $("send-btn").disabled = true;

  appendMsg("user", escHtml(text));

  if (doStream) {
    await sendStream(text, model);
  } else {
    await sendFull(text, model);
  }

  isThinking = false;
  $("send-btn").disabled = false;
  loadSessions();
}

async function sendFull(text, model) {
  showTyping();
  try {
    const res  = await fetch(`${API}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message:    text,
        session_id: currentSession,
        model:      model || undefined,
        stream:     false,
      }),
    });
    hideTyping();
    if (!res.ok) {
      const err = await res.text();
      appendMsg("ai", `<span style="color:var(--red)">API error ${res.status}: ${escHtml(err)}</span>`);
      return;
    }
    const data = await res.json();
    appendMsg("ai", mdToHtml(data.reply), data.tools_used);
  } catch (e) {
    hideTyping();
    appendMsg("ai", `<span style="color:var(--red)">Network error: ${escHtml(String(e))}</span>`);
  }
}

async function sendStream(text, model) {
  // Create an empty bubble that we'll fill token-by-token
  const wrap   = document.createElement("div");
  wrap.className = "msg ai";
  const label  = document.createElement("div");
  label.className = "msg-role";
  label.textContent = "Assistant";
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = `<span class="typing"><span></span><span></span><span></span></span>`;
  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chatWindow.appendChild(wrap);
  scrollBottom();

  let buffer = "";

  try {
    const res = await fetch(`${API}/api/chat/stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message:    text,
        session_id: currentSession,
        model:      model || undefined,
        stream:     true,
      }),
    });

    const reader  = res.body.getReader();
    const decoder = new TextDecoder();
    let partial   = "";

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      partial += decoder.decode(value, { stream: true });
      const lines = partial.split("\n");
      partial = lines.pop();                   // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const token = line.slice(6);
        if (token === "[DONE]") break;
        if (token.startsWith("[ERROR]")) {
          bubble.innerHTML = `<span style="color:var(--red)">${escHtml(token)}</span>`;
          return;
        }
        buffer += token;
        bubble.innerHTML = mdToHtml(buffer);
        scrollBottom();
      }
    }
  } catch (e) {
    bubble.innerHTML = `<span style="color:var(--red)">Stream error: ${escHtml(String(e))}</span>`;
  }
}

/* ── Memory panel ────────────────────────────────────────────────────── */
async function loadFacts() {
  const list = $("fact-list");
  list.innerHTML = "<em style='color:var(--text-dim)'>Loading…</em>";
  try {
    const res   = await fetch(`${API}/api/memory`);
    const facts = await res.json();
    if (!facts.length) {
      list.innerHTML = "<em style='color:var(--text-dim)'>No facts stored yet.</em>";
      return;
    }
    list.innerHTML = "";
    facts.forEach(f => {
      const row  = document.createElement("div");
      row.className = "fact-row";
      row.innerHTML = `
        <span class="fact-key">${escHtml(f.key)}</span>
        <span class="fact-value">${escHtml(f.value)}</span>
        <button class="fact-del" data-key="${escHtml(f.key)}" title="Delete">×</button>`;
      list.appendChild(row);
    });
    list.querySelectorAll(".fact-del").forEach(btn => {
      btn.onclick = async () => {
        await fetch(`${API}/api/memory/${btn.dataset.key}`, { method: "DELETE" });
        loadFacts();
      };
    });
  } catch (e) {
    list.innerHTML = `<em style='color:var(--red)'>Error: ${e}</em>`;
  }
}

$("memory-btn").onclick = () => {
  $("memory-panel").classList.add("open");
  loadFacts();
};
$("memory-close").onclick = () => $("memory-panel").classList.remove("open");
$("memory-panel").onclick = e => { if (e.target === $("memory-panel")) $("memory-panel").classList.remove("open"); };

$("fact-add-btn").onclick = async () => {
  const key   = $("fact-key").value.trim();
  const value = $("fact-value").value.trim();
  if (!key || !value) return;
  await fetch(`${API}/api/memory`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ key, value, source: "manual" }),
  });
  $("fact-key").value = "";
  $("fact-value").value = "";
  loadFacts();
};

/* ── Input auto-resize + send on Enter ──────────────────────────────── */
const textarea = $("user-input");
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = Math.min(textarea.scrollHeight, 160) + "px";
});
textarea.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$("send-btn").onclick = sendMessage;

/* ── Toolbar actions ─────────────────────────────────────────────────── */
$("new-chat-btn").onclick = () => {
  const id = genSessionId();
  currentSession = id;
  chatWindow.innerHTML = "";
  appendMsg("ai", "New chat started. How can I help?");
  loadSessions();
};

$("clear-btn").onclick = async () => {
  if (!confirm("Clear this chat session?")) return;
  await fetch(`${API}/api/sessions/${currentSession}`, { method: "DELETE" });
  chatWindow.innerHTML = "";
  appendMsg("ai", "Chat cleared. Start a new conversation!");
};

/* ── Init ────────────────────────────────────────────────────────────── */
(async () => {
  await checkOllama();
  await loadSessions();
  setInterval(checkOllama, 30_000);
})();
</script>
</body>
